version: 2

models:
  - name: stg_orders
    description: "Cleaned order data from the silver layer."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - not_null
          - unique

      - name: product
        description: "Product name."
        tests:
          - not_null

      - name: price
        description: "Order price."
        tests:
          - not_null